services:
  - type: web
    name: sprintdock-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.28.2 --activate
      pnpm install --frozen-lockfile
    startCommand: pnpm --filter @sprintdock/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RABBIT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGINS
        value: https://sprintdock-huseyinkaplan.vercel.app
      - key: OTP_RATE_LIMIT_WINDOW_SEC
        value: 60
      - key: OTP_RATE_LIMIT_MAX
        value: 3
      # Demo-only: allow OTP code to be returned in response even in production.
      # Disable for real deployments and send OTP via email/SMS instead.
      - key: OTP_ECHO
        value: 'true'
      - key: INTERNAL_API_KEY
        sync: false
  # Some accounts can't create background workers on the free plan.
  # For a zero-cost demo, run the worker as a tiny web service (it exposes /health when PORT is set).
  - type: web
    name: sprintdock-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.28.2 --activate
      pnpm install --frozen-lockfile
    startCommand: pnpm --filter @sprintdock/worker start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RABBIT_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: API_INTERNAL_URL
        sync: false
