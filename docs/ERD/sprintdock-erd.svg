<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .box { fill:#fff; stroke:#1f2937; stroke-width:2; rx:10; ry:10; }
    .title { font:700 18px sans-serif; fill:#0f172a; }
    .text { font:14px sans-serif; fill:#334155; }
    .line { stroke:#475569; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#475569" />
    </marker>
  </defs>

  <rect class="box" x="70" y="60" width="290" height="170"/>
  <text class="title" x="90" y="92">users</text>
  <text class="text" x="90" y="124">_id (ObjectId)</text>
  <text class="text" x="90" y="148">email (unique)</text>
  <text class="text" x="90" y="172">role (admin/member)</text>

  <rect class="box" x="450" y="60" width="320" height="210"/>
  <text class="title" x="470" y="92">projects</text>
  <text class="text" x="470" y="124">_id</text>
  <text class="text" x="470" y="148">title, description, status</text>
  <text class="text" x="470" y="172">owner -> users._id</text>
  <text class="text" x="470" y="196">members[] -> users._id</text>
  <text class="text" x="470" y="220">tags[]</text>

  <rect class="box" x="860" y="60" width="280" height="210"/>
  <text class="title" x="880" y="92">tasks</text>
  <text class="text" x="880" y="124">_id</text>
  <text class="text" x="880" y="148">projectId -> projects._id</text>
  <text class="text" x="880" y="172">title, description, status</text>
  <text class="text" x="880" y="196">assignee -> users._id | null</text>
  <text class="text" x="880" y="220">priority, dueDate, createdBy</text>

  <rect class="box" x="860" y="340" width="280" height="170"/>
  <text class="title" x="880" y="372">comments</text>
  <text class="text" x="880" y="404">_id</text>
  <text class="text" x="880" y="428">taskId -> tasks._id</text>
  <text class="text" x="880" y="452">author -> users._id</text>
  <text class="text" x="880" y="476">content</text>

  <rect class="box" x="70" y="340" width="290" height="170"/>
  <text class="title" x="90" y="372">sessions</text>
  <text class="text" x="90" y="404">_id</text>
  <text class="text" x="90" y="428">userId -> users._id</text>
  <text class="text" x="90" y="452">refreshTokenId, device, ip</text>
  <text class="text" x="90" y="476">lastUsed</text>

  <rect class="box" x="450" y="340" width="320" height="150"/>
  <text class="title" x="470" y="372">otp</text>
  <text class="text" x="470" y="404">email</text>
  <text class="text" x="470" y="428">otpHash</text>
  <text class="text" x="470" y="452">expiresAt, attempts</text>

  <line class="line" x1="360" y1="120" x2="450" y2="140"/>
  <line class="line" x1="770" y1="160" x2="860" y2="160"/>
  <line class="line" x1="1000" y1="270" x2="1000" y2="340"/>
  <line class="line" x1="220" y1="230" x2="220" y2="340"/>
</svg>
