<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="560" viewBox="0 0 1300 560">
  <style>
    .node { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:12; ry:12; }
    .title { font:700 18px sans-serif; fill:#0f172a; }
    .text { font:14px sans-serif; fill:#334155; }
    .line { stroke:#2563eb; stroke-width:2.5; marker-end:url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="node" x="50" y="210" width="220" height="120"/>
  <text class="title" x="75" y="248">Web Client</text>
  <text class="text" x="75" y="276">/projects/:id room join</text>
  <text class="text" x="75" y="300">listens: task.updated, comment.added</text>

  <rect class="node" x="340" y="120" width="250" height="120"/>
  <text class="title" x="365" y="158">API REST</text>
  <text class="text" x="365" y="186">task/comment mutations</text>
  <text class="text" x="365" y="210">publishes Rabbit events</text>

  <rect class="node" x="340" y="300" width="250" height="120"/>
  <text class="title" x="365" y="338">API Socket Namespace</text>
  <text class="text" x="365" y="366">/realtime</text>
  <text class="text" x="365" y="390">join_project / leave_project</text>

  <rect class="node" x="680" y="210" width="220" height="120"/>
  <text class="title" x="705" y="248">RabbitMQ</text>
  <text class="text" x="705" y="276">task_created</text>
  <text class="text" x="705" y="300">task_assigned / comment_added</text>

  <rect class="node" x="980" y="210" width="240" height="120"/>
  <text class="title" x="1005" y="248">Worker</text>
  <text class="text" x="1005" y="276">consume + route</text>
  <text class="text" x="1005" y="300">POST /internal/realtime</text>

  <line class="line" x1="270" y1="240" x2="340" y2="190"/>
  <line class="line" x1="590" y1="180" x2="680" y2="240"/>
  <line class="line" x1="900" y1="270" x2="980" y2="270"/>
  <line class="line" x1="980" y1="300" x2="590" y2="360"/>
  <line class="line" x1="340" y1="360" x2="270" y2="300"/>

  <text class="text" x="610" y="90">task_created/task_assigned -> task.updated</text>
  <text class="text" x="610" y="112">comment_added -> comment.added</text>
</svg>
